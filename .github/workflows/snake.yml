name: Generate Snake

on:
schedule:
- cron: "0 0 * * *"
workflow_dispatch:
push:
branches:
- main

jobs:
generate:
permissions:
contents: write

```
runs-on: ubuntu-latest
timeout-minutes: 5

steps:
  - name: Generate snake animation
    uses: Platane/snk/svg-only@v3
    with:
      github_user_name: ${{ github.repository_owner }}
      outputs: |
        dist/github-contribution-grid-snake.svg?color_snake=%2338BDF8&color_dots=%23EBEDF0,%23BAE6FD,%237DD3FC,%2338BDF8,%230284C7
        dist/github-contribution-grid-snake-dark.svg?color_snake=%2338BDF8&color_dots=%23161B22,%230F3A4A,%23075985,%230EA5E9,%2338BDF8

  - name: Push snake animation to output branch
    uses: crazy-max/ghaction-github-pages@v3.1.0
    with:
      target_branch: output
      build_dir: dist
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
